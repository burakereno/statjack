name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load Release Contract
        run: |
          if grep -Ev '^(#.*|[[:space:]]*|[A-Z0-9_]+=[^[:cntrl:]]*)$' .github/release-contract.env; then
            echo "::error::Invalid release contract syntax"
            exit 1
          fi
          cat .github/release-contract.env >> "$GITHUB_ENV"
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate Signing Secrets
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          missing=0
          for name in \
            MACOS_CERTIFICATE_P12_BASE64 \
            MACOS_CERTIFICATE_PASSWORD \
            KEYCHAIN_PASSWORD \
            APPLE_ID \
            APPLE_TEAM_ID \
            APPLE_APP_SPECIFIC_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Developer ID signing and notarization secrets are required before publishing a release."
            exit 1
          fi

      - name: Import Developer ID Certificate
        id: signing
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk '/Developer ID Application/ { print $2; exit }')"
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in imported certificate."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "identity=$SIGNING_IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Auto Version
        id: version
        run: |
          # Get latest tag, default to v1.0.0 if none exists
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEW_VERSION="v1.0.1"
          else
            # Parse major.minor.patch and bump patch
            VERSION=${LATEST#v}
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 New version: $NEW_VERSION"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Patch Info.plist with computed version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHORT_VERSION="${VERSION#v}"
          BUILD_NUMBER=$(echo "$SHORT_VERSION" | cut -d. -f3)
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $SHORT_VERSION" StatJack/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" StatJack/Info.plist
          echo "📌 Info.plist version pinned to $SHORT_VERSION (build $BUILD_NUMBER)"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" StatJack/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" StatJack/Info.plist

      - name: Build Release
        run: |
          xcodebuild -project StatJack.xcodeproj \
            -scheme StatJack \
            -configuration Release \
            clean build \
            SYMROOT="${PWD}/build"

      - name: Sign App Bundle
        run: |
          codesign --force --deep \
            --options runtime \
            --timestamp \
            --sign "${{ steps.signing.outputs.identity }}" \
            build/Release/StatJack.app

      - name: Verify built app version matches tag
        run: |
          BUILT=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" build/Release/StatJack.app/Contents/Info.plist)
          EXPECTED="${{ steps.version.outputs.version }}"
          EXPECTED="${EXPECTED#v}"
          if [ "$BUILT" != "$EXPECTED" ]; then
            echo "::error::Built app reports $BUILT but expected $EXPECTED"
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 build/Release/StatJack.app
          SIGNING_DETAILS="$(codesign -dv --verbose=4 build/Release/StatJack.app 2>&1)"
          echo "$SIGNING_DETAILS"
          if echo "$SIGNING_DETAILS" | grep -q "Signature=adhoc"; then
            echo "::error::Release app is ad-hoc signed; expected Developer ID."
            exit 1
          fi
          if ! echo "$SIGNING_DETAILS" | grep -q "Authority=Developer ID Application"; then
            echo "::error::Release app is not signed with a Developer ID Application certificate."
            exit 1
          fi
          if ! echo "$SIGNING_DETAILS" | grep -q "runtime"; then
            echo "::error::Release app is missing hardened runtime."
            exit 1
          fi
          echo "✅ Built app version $BUILT matches tag"

      - name: Verify Release Contract
        run: |
          APP_PATH="build/Release/$APP_BUNDLE_NAME"
          INFO_PLIST="$APP_PATH/Contents/Info.plist"
          ACTUAL_BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$INFO_PLIST")
          if [ "$ACTUAL_BUNDLE_ID" != "$BUNDLE_IDENTIFIER" ]; then
            echo "::error::Bundle identifier mismatch: $ACTUAL_BUNDLE_ID"
            exit 1
          fi
          test -x "$APP_PATH/Contents/MacOS/$EXECUTABLE_NAME"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          SIGNING_DETAILS="$(codesign -dv --verbose=4 "$APP_PATH" 2>&1)"
          ACTUAL_TEAM="$(printf '%s\n' "$SIGNING_DETAILS" | sed -n 's/^TeamIdentifier=//p' | tail -1)"
          if [ "$ACTUAL_TEAM" != "$TEAM_IDENTIFIER" ]; then
            echo "::error::TeamIdentifier mismatch: $ACTUAL_TEAM"
            exit 1
          fi
          if ! printf '%s\n' "$SIGNING_DETAILS" | grep -q runtime; then
            echo "::error::Release app is missing hardened runtime (--options runtime)."
            exit 1
          fi
      - name: Notarize App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          ditto -c -k --keepParent build/Release/StatJack.app StatJack.zip
          xcrun notarytool submit StatJack.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple build/Release/StatJack.app
          xcrun stapler validate build/Release/StatJack.app

      - name: Assess Notarized App
        run: |
          APP_PATH="build/Release/$APP_BUNDLE_NAME"
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"
      - name: Create DMG
        run: |
          ./scripts/create-dmg.sh "build/Release/StatJack.app" StatJack.dmg
          codesign --force --sign "${{ steps.signing.outputs.identity }}" --timestamp StatJack.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool submit StatJack.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple StatJack.dmg
          xcrun stapler validate StatJack.dmg

      - name: Verify DMG and Generate Update Manifest
        run: |
          codesign --verify --strict --verbose=2 "$DMG_ASSET_NAME"
          DMG_DETAILS="$(codesign -dv --verbose=4 "$DMG_ASSET_NAME" 2>&1)"
          DMG_TEAM="$(printf '%s\n' "$DMG_DETAILS" | sed -n 's/^TeamIdentifier=//p' | tail -1)"
          if [ "$DMG_TEAM" != "$TEAM_IDENTIFIER" ]; then
            echo "::error::DMG TeamIdentifier mismatch: $DMG_TEAM"
            exit 1
          fi
          xcrun stapler validate "$DMG_ASSET_NAME"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG_ASSET_NAME"
          SHA256="$(shasum -a 256 "$DMG_ASSET_NAME" | awk '{print $1}')"
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          cat > "$MANIFEST_ASSET_NAME" <<JSON
          {
            "version": "$VERSION",
            "asset": "$DMG_ASSET_NAME",
            "sha256": "$SHA256",
            "bundleIdentifier": "$BUNDLE_IDENTIFIER",
            "teamIdentifier": "$TEAM_IDENTIFIER"
          }
          JSON
          plutil -lint "$MANIFEST_ASSET_NAME"
      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: |
            StatJack.dmg
            StatJack.dmg.update.json
          body: |
            ## StatJack ${{ steps.version.outputs.version }}

            ### Installation
            1. Download **StatJack.dmg** below
            2. Open DMG and drag **StatJack.app** to Applications
            3. Launch StatJack — it will appear in your menu bar

            ### Requirements
            - macOS 14.0 (Sonoma) or later
            - Apple Silicon (arm64)
