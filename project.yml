name: StatJack
options:
  bundleIdPrefix: com.statjack
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"

targets:
  StatJack:
    type: application
    platform: macOS
    sources:
      - path: StatJack
    info:
      path: StatJack/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.29"
        CFBundleVersion: "29"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.statjack.app
        PRODUCT_NAME: StatJack
        INFOPLIST_FILE: StatJack/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CLANG_ENABLE_MODULES: "YES"
    entitlements:
      path: StatJack/StatJack.entitlements

  StatJackTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: StatJackTests
    dependencies:
      - target: StatJack
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true

schemes:
  StatJack:
    build:
      targets:
        StatJack: all
        StatJackTests: [test]
    test:
      targets:
        - StatJackTests
