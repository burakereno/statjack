name: StatJack
options:
  bundleIdPrefix: com.statjack
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"

targets:
  StatJack:
    type: application
    platform: macOS
    sources:
      - path: StatJack
    info:
      path: StatJack/Info.plist
      properties:
        LSUIElement: true
        CFBundleShortVersionString: "1.0.13"
        CFBundleVersion: "13"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.statjack.app
        PRODUCT_NAME: StatJack
        INFOPLIST_FILE: StatJack/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: StatJack/Bridging/StatJack-Bridging-Header.h
        CLANG_ENABLE_MODULES: "YES"
    entitlements:
      path: StatJack/StatJack.entitlements
